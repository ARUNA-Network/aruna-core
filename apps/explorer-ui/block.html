        <li role="none"><a href="block.html" class="nav-link active" role="menuitem">Block</a></li>

      <span class="breadcrumb-sep">›</span>
      <span>Block</span>
      <span class="breadcrumb-sep">›</span>
      <span id="breadcrumb-id" class="mono">—</span>
    </div>

    <div class="detail-header">
      <div class="detail-icon-wrap">
        <span class="detail-icon">📦</span>
      </div>
      <div>
        <h1 class="detail-title" id="block-title">Block <span id="block-height-heading">—</span></h1>
        <div class="detail-hash mono" id="block-hash-heading">—</div>
      </div>
    </div>

    <section class="detail-card" aria-label="Block header fields" id="block-detail-card">
      <div class="skeleton-block"></div>
    </section>

    <section class="panel mt-lg" id="block-txs-panel" aria-label="Transactions in block">
      <div class="panel-header">
        <h2 class="panel-title"><span class="panel-icon">⚡</span> Transactions <span class="badge" id="block-tx-count">—</span></h2>
      </div>
      <div class="panel-body" id="block-txs-list" role="list" aria-live="polite">
        <div class="skeleton-row"></div>
        <div class="skeleton-row"></div>
