<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Transaction — ARUNA Explorer</title>
  <meta name="description" content="ARUNA Network transaction details including sender, recipient, amount, and block confirmation." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <nav class="navbar" role="navigation">
    <div class="nav-inner">
      <a href="index.html" class="nav-logo" aria-label="ARUNA Explorer Home">
        <div class="logo-icon">⬡</div>
        <div class="logo-text">
          <span class="logo-name">ARUNA</span>
          <span class="logo-sub">Explorer</span>
        </div>
      </a>
      <div class="nav-badge">Sumatera Testnet</div>
      <form class="nav-search" id="nav-search-form" role="search" aria-label="Search blockchain">
        <input id="nav-search-input" type="search" placeholder="Search block, tx, or address…" autocomplete="off" aria-label="Search" />
        <button type="submit" id="nav-search-btn" aria-label="Submit search">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        </button>
      </form>
    </div>
  </nav>

  <main class="container page-detail" id="main-content">
    <div class="breadcrumb" aria-label="Breadcrumb">
      <a href="index.html">Home</a>
      <span class="breadcrumb-sep">›</span>
      <span>Transaction</span>
      <span class="breadcrumb-sep">›</span>
      <span id="breadcrumb-id" class="mono">—</span>
    </div>

    <div class="detail-header">
      <div class="detail-icon-wrap">
        <span class="detail-icon">⚡</span>
      </div>
      <div>
        <h1 class="detail-title">Transaction</h1>
        <div class="detail-hash mono" id="tx-hash-heading">—</div>
      </div>
    </div>

    <section class="detail-card" aria-label="Transaction fields" id="tx-detail-card">
      <div class="skeleton-block"></div>
    </section>
  </main>

  <footer class="footer" role="contentinfo">
    <div class="container footer-inner">
      <span>© 2025 ARUNA Network — <em>Dari Rakyat. Oleh Rakyat. Untuk Rakyat.</em></span>
      <span class="footer-links"><a href="https://github.com/ARUNA-Network/aruna-core" target="_blank" rel="noopener">GitHub</a></span>
    </div>
  </footer>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      ARUNA.initTxDetail();
    });
  </script>
</body>
</html>
