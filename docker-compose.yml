services:
  # ── Development Environment ──────────────────────────────────────────────
  # Full ODE toolchain: Rust 1.96.0, GCC 14, LLVM 18, CMake, RocksDB
  # Usage: docker compose run --rm dev bash
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ghcr.io/aruna-network/dev:local
    container_name: aruna-dev
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
    working_dir: /workspace
    environment:
      - CXXFLAGS=-include cstdint
      - LIBCLANG_PATH=/usr/lib/llvm-18/lib
      - CC=gcc
      - CXX=g++
    stdin_open: true
    tty: true
    profiles:
      - dev

  # ── Node Runtime ─────────────────────────────────────────────────────────
  # Minimal production runtime image (no Rust, no compiler)
  # Usage: docker compose up -d node
  node:
    build:
      context: .
      dockerfile: Dockerfile.node
    image: ghcr.io/aruna-network/node:local
    container_name: aruna-node
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "9000:9000"   # P2P — must be open to the internet
      # RPC port 8080 is NOT exposed externally; cloudflared handles it internally
    volumes:
      - ./data:/app/data_sumatera   # Bind mount for easy access and backup
    environment:
      - RUST_LOG=info
    command: ["daemon", "--p2p-port", "9000", "--rpc-port", "8080"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/status"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── Cloudflare Tunnel ────────────────────────────────────────────────────
  # Exposes the RPC API securely via Cloudflare without opening port 8080
  # Prerequisite: configure ~/.cloudflared/config.yml with your tunnel credentials
  # Usage: docker compose up -d cloudflared
  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: aruna-cloudflared
    restart: unless-stopped
    depends_on:
      node:
        condition: service_healthy
    command: tunnel --config /etc/cloudflared/config.yml run
    volumes:
      - ${HOME}/.cloudflared:/etc/cloudflared:ro
    profiles:
      - production

  # ── Test Runner ──────────────────────────────────────────────────────────
  # Runs the full workspace test suite inside the ODE image
  # Usage: docker compose run --rm test
  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ghcr.io/aruna-network/dev:local
    container_name: aruna-test
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
    working_dir: /workspace
    environment:
      - CXXFLAGS=-include cstdint
      - LIBCLANG_PATH=/usr/lib/llvm-18/lib
      - CC=gcc
      - CXX=g++
    command: ["cargo", "test", "--workspace"]
    profiles:
      - test

volumes:
  cargo-cache:
    driver: local
  target-cache:
    driver: local
