services:
  # ── Development Environment ──────────────────────────────────────────────
  # Full ODE toolchain: Rust 1.96.0, GCC 14, LLVM 18, CMake, RocksDB
  # Usage: docker compose run --rm dev bash
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ghcr.io/aruna-network/dev:local
    container_name: aruna-dev
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
    working_dir: /workspace
    environment:
      - CXXFLAGS=-include cstdint
      - LIBCLANG_PATH=/usr/lib/llvm-18/lib
      - CC=gcc
      - CXX=g++
    stdin_open: true
    tty: true
    profiles:
      - dev

  # ── Node Runtime ─────────────────────────────────────────────────────────
  # Minimal production runtime image (no Rust, no compiler)
  # P2P port 9000 is open to internet.
  # RPC port 8080 is bound to 127.0.0.1 only — cloudflared.service accesses it via localhost.
  # Usage: docker compose up -d node
  node:
    build:
      context: .
      dockerfile: Dockerfile.node
    image: ghcr.io/aruna-network/node:local
    container_name: aruna-node
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "9000:9000"               # P2P — must be open to internet
      - "127.0.0.1:8080:8080"     # RPC — localhost only (cloudflared systemd service accesses this)
    volumes:
      - ./data:/app/data_sumatera
    environment:
      - RUST_LOG=info
    command: ["--p2p-port", "9000", "--rpc-port", "8080"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── PostgreSQL (Explorer Index DB) ───────────────────────────────────────
  # Shared database for aruna-indexer (writes) and aruna-explorer (reads).
  # ADR-0017: Explorer Architecture
  postgres:
    image: postgres:16-alpine
    container_name: aruna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aruna
      POSTGRES_PASSWORD: aruna
      POSTGRES_DB: aruna_explorer
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"    # localhost only
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aruna -d aruna_explorer"]
      interval: 10s
      timeout: 5s
      retries: 5
    profiles:
      - explorer

  # ── Indexer ───────────────────────────────────────────────────────────────
  # Polls Node RPC, writes indexed data to PostgreSQL.
  # ADR-0017: Never reads RocksDB directly.
  indexer:
    build:
      context: .
      dockerfile: Dockerfile.node
    image: ghcr.io/aruna-network/node:local
    container_name: aruna-indexer
    restart: unless-stopped
    depends_on:
      node:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - RUST_LOG=info
    volumes:
      - ./config:/app/config:ro
    command: ["aruna-indexer", "--config", "/app/config/indexer.toml"]
    profiles:
      - explorer

  # ── Explorer REST API ─────────────────────────────────────────────────────
  # Reads from PostgreSQL, serves /api/v1/* endpoints.
  # ADR-0017: Never reads RocksDB or Node RPC directly.
  explorer:
    build:
      context: .
      dockerfile: Dockerfile.node
    image: ghcr.io/aruna-network/node:local
    container_name: aruna-explorer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - RUST_LOG=info
    ports:
      - "127.0.0.1:3000:3000"    # localhost only (serve via Cloudflare Tunnel)
    volumes:
      - ./config:/app/config:ro
    command: ["aruna-explorer", "--config", "/app/config/explorer.toml"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    profiles:
      - explorer

  # ── Test Runner ──────────────────────────────────────────────────────────
  # Usage: docker compose run --rm test
  test:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: ghcr.io/aruna-network/dev:local
    container_name: aruna-test
    volumes:
      - .:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target
    working_dir: /workspace
    environment:
      - CXXFLAGS=-include cstdint
      - LIBCLANG_PATH=/usr/lib/llvm-18/lib
      - CC=gcc
      - CXX=g++
    command: ["cargo", "test", "--workspace"]
    profiles:
      - test

volumes:
  cargo-cache:
    driver: local
  target-cache:
    driver: local
  postgres-data:
    driver: local
