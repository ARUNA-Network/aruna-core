name: ARUNA CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cargo Check
        run: cargo check --workspace

      - name: Cargo Test
        run: cargo test --workspace

      - name: Build Aruna Node
        run: cargo build -p aruna-node

      - name: Run Node (First Startup - Milestone B & A)
        run: |
          timeout 95s cargo run -p aruna-node > node_startup.log 2>&1 || true

      - name: Verify First Startup & Block Production Log
        run: |
          cat node_startup.log
          grep -q "Initializing new ledger state from genesis config" node_startup.log
          grep -q "ARUNA Node Started" node_startup.log
          grep -q "Genesis : Loaded" node_startup.log
          grep -q "Storage : Opened" node_startup.log
          grep -q "State   : Initialized" node_startup.log
          grep -q "Block #1 produced" node_startup.log
          grep -q "Block #2 produced" node_startup.log
          grep -q "Block #3 produced" node_startup.log
          grep -q "Height: 1" node_startup.log
          grep -q "Height: 2" node_startup.log
          grep -q "Height: 3" node_startup.log
          grep -q "Height=3" node_startup.log

      - name: Verify RocksDB Database Created
        run: |
          ls -lah data_sumatera/

      - name: Prepare Mempool Test Transaction
        run: |
          cargo run -p aruna-testing --bin mempool_test_prep

      - name: Run Node, Submit Tx & RPC Verification
        run: |
          cargo run -p aruna-node > node_recovery.log 2>&1 &
          NODE_PID=$!
          echo "Node started in background with PID $NODE_PID"
          
          # Wait 5 seconds for RPC server to bind
          sleep 5
          
          echo "Submitting test transaction via CLI submit command..."
          cargo run -p aruna-node -- submit test_tx.json > submit_response.json
          cat submit_response.json
          
          # Assert transaction successfully accepted by mempool
          grep -q '"status":"success"' submit_response.json
          grep -q '"tx_hash":' submit_response.json
          
          # Wait remaining 87 seconds for blocks 4, 5, and 6 to be produced
          sleep 87
          
          echo "Querying RPC /status endpoint..."
          curl -s http://127.0.0.1:8080/status > rpc_status.json
          cat rpc_status.json
          
          # Kill the node gracefully
          kill $NODE_PID || true
          wait $NODE_PID || true
          
          # Verify RPC response
          grep -q '"network":"sumatera"' rpc_status.json
          grep -q '"height":6' rpc_status.json

      - name: Verify Recovery & Persistence Log
        run: |
          cat node_recovery.log
          grep -q "Genesis already initialized. Loading existing ledger state" node_recovery.log
          grep -q "Block #4 produced with 1 transactions" node_recovery.log
          grep -q "Block #5 produced with 0 transactions" node_recovery.log
          grep -q "Block #6 produced with 0 transactions" node_recovery.log
          grep -q "Height: 4" node_recovery.log
          grep -q "Height: 5" node_recovery.log
          grep -q "Height: 6" node_recovery.log
          grep -q "Height=6" node_recovery.log
          ! grep -q "Initializing new ledger state from genesis config" node_recovery.log

      - name: Verify CLI Chain Inspection
        run: |
          echo "Testing aruna-node status command..."
          cargo run -p aruna-node -- status > cli_status.json
          cat cli_status.json
          grep -q '"height":6' cli_status.json
          grep -q '"tip":' cli_status.json
          
          echo "Testing aruna-node blocks command..."
          cargo run -p aruna-node -- blocks > cli_blocks.txt
          cat cli_blocks.txt
          [ "$(cat cli_blocks.txt | xargs)" = "1 2 3 4 5 6" ]
          
          echo "Testing aruna-node block 3 command..."
          cargo run -p aruna-node -- block 3 > cli_block_3.json
          cat cli_block_3.json
          grep -q '"height":3' cli_block_3.json
          grep -q '"hash":' cli_block_3.json
          
          echo "Testing aruna-node block 6 command..."
          cargo run -p aruna-node -- block 6 > cli_block_6.json
          cat cli_block_6.json
          grep -q '"height":6' cli_block_6.json
          grep -q '"hash":' cli_block_6.json

      - name: Run Local Two-Node Synchronization Check
        run: |
          echo "Starting Node A on P2P port 9000, RPC port 8080..."
          cargo run -p aruna-node -- --p2p-port 9000 --rpc-port 8080 > node_a.log 2>&1 &
          NODE_A_PID=$!
          
          # Wait 5 seconds for Node A to bind and listen
          sleep 5
          
          echo "Starting Node B (fresh sync node) on P2P port 9001, RPC port 8081, connecting to Node A..."
          # Clean data directory for Node B to ensure a clean sync test
          rm -rf ./data_sumatera_9001
          cargo run -p aruna-node -- --p2p-port 9001 --rpc-port 8081 --peer 127.0.0.1:9000 > node_b.log 2>&1 &
          NODE_B_PID=$!
          
          # Wait 15 seconds for Node B to handshake, request sync, process blocks, and commit
          sleep 15
          
          echo "Querying Node B RPC status..."
          curl -s http://127.0.0.1:8081/status > node_b_status.json
          cat node_b_status.json
          
          # Assert that Node B successfully synchronized up to height 6
          grep -q '"height":6' node_b_status.json
          
          # Terminate both nodes gracefully
          kill $NODE_A_PID $NODE_B_PID || true
          wait $NODE_A_PID $NODE_B_PID || true
          
          echo "Verifying Node B synchronization logs..."
          cat node_b.log
          grep -q "P2P Handshake successful with peer 127.0.0.1:9000" node_b.log
          grep -q "Synced and committed Block #4" node_b.log
          grep -q "Synced and committed Block #5" node_b.log
          grep -q "Synced and committed Block #6" node_b.log
          grep -q "Synchronization complete" node_b.log

