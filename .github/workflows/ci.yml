name: ARUNA CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Cargo Check
        run: cargo check --workspace

      - name: Cargo Test
        run: cargo test --workspace

      - name: Build Aruna Node
        run: cargo build -p aruna-node

      - name: Run Node (First Startup - Milestone B & A)
        run: |
          timeout 95s cargo run -p aruna-node > node_startup.log 2>&1 || true

      - name: Verify First Startup & Block Production Log
        run: |
          cat node_startup.log
          grep "Initializing new ledger state from genesis config" node_startup.log
          grep "ARUNA Node Started" node_startup.log
          grep "Genesis : Loaded" node_startup.log
          grep "Storage : Opened" node_startup.log
          grep "State   : Initialized" node_startup.log
          grep "Block #1 produced" node_startup.log
          grep "Block #2 produced" node_startup.log
          grep "Block #3 produced" node_startup.log
          grep "Height: 1" node_startup.log
          grep "Height: 2" node_startup.log
          grep "Height: 3" node_startup.log
          grep "Height=3" node_startup.log

      - name: Verify RocksDB Database Created
        run: |
          ls -lah data_sumatera/

      - name: Run Node (Second Startup & RPC Verification)
        run: |
          cargo run -p aruna-node > node_recovery.log 2>&1 &
          NODE_PID=$!
          echo "Node started in background with PID $NODE_PID"
          
          # Wait 92 seconds for blocks 4, 5, and 6 to be produced
          sleep 92
          
          echo "Querying RPC /status endpoint..."
          curl -s http://127.0.0.1:8080/status > rpc_status.json
          cat rpc_status.json
          
          # Kill the node gracefully
          kill $NODE_PID || true
          wait $NODE_PID || true
          
          # Verify RPC response
          grep -q '"network":"sumatera"' rpc_status.json
          grep -q '"height":6' rpc_status.json

      - name: Verify Recovery & Persistence Log
        run: |
          cat node_recovery.log
          grep "Genesis already initialized. Loading existing ledger state" node_recovery.log
          grep "Block #4 produced" node_recovery.log
          grep "Block #5 produced" node_recovery.log
          grep "Block #6 produced" node_recovery.log
          grep "Height: 4" node_recovery.log
          grep "Height: 5" node_recovery.log
          grep "Height: 6" node_recovery.log
          grep "Height=6" node_recovery.log
          ! grep "Initializing new ledger state from genesis config" node_recovery.log

