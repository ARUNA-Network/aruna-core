name: Build & Validate Dev Image

on:
  push:
    branches:
      - main
    paths:
      - 'docker/node/Dockerfile'
      - 'rust-toolchain.toml'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/docker-publish.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aruna-network/dev

jobs:
  # ── Job 1: Build the dev image ──────────────────────────────────────────────
  build:
    name: Build Dev Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.tags }}
      image_digest: ${{ steps.build.outputs.digest }}
      short_sha: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push dev image (linux/amd64 + linux/arm64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/node/Dockerfile
          target: dev
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            RUST_VERSION=1.96.0

  # ── Job 2: Validate the dev image ───────────────────────────────────────────
  # Runs the image and verifies the toolchain and workspace compile correctly.
  # The image is ONLY published to GHCR if this job succeeds.
  validate:
    name: Validate ODE Image
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull the freshly built dev image
        run: |
          docker pull ghcr.io/aruna-network/dev:sha-${{ needs.build.outputs.short_sha }}

      # ── Toolchain checks ────────────────────────────────────────────────────
      - name: Verify rustc version
        run: |
          docker run --rm \
            ghcr.io/aruna-network/dev:sha-${{ needs.build.outputs.short_sha }} \
            rustc --version

      - name: Verify cargo version
        run: |
          docker run --rm \
            ghcr.io/aruna-network/dev:sha-${{ needs.build.outputs.short_sha }} \
            cargo --version

      - name: Verify gcc version
        run: |
          docker run --rm \
            ghcr.io/aruna-network/dev:sha-${{ needs.build.outputs.short_sha }} \
            gcc --version

      - name: Verify cmake version
        run: |
          docker run --rm \
            ghcr.io/aruna-network/dev:sha-${{ needs.build.outputs.short_sha }} \
            cmake --version

      - name: Verify clang version
        run: |
          docker run --rm \
            ghcr.io/aruna-network/dev:sha-${{ needs.build.outputs.short_sha }} \
            clang --version

      # ── Workspace checks ────────────────────────────────────────────────────
      - name: cargo check --workspace
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "cargo-registry:/usr/local/cargo/registry" \
            -w /workspace \
            -e CXXFLAGS="-include cstdint" \
            -e LIBCLANG_PATH=/usr/lib/llvm-18/lib \
            -e CC=gcc \
            -e CXX=g++ \
            ghcr.io/aruna-network/dev:sha-${{ needs.build.outputs.short_sha }} \
            cargo check --workspace

      - name: cargo test --workspace
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -v "cargo-registry:/usr/local/cargo/registry" \
            -w /workspace \
            -e CXXFLAGS="-include cstdint" \
            -e LIBCLANG_PATH=/usr/lib/llvm-18/lib \
            -e CC=gcc \
            -e CXX=g++ \
            ghcr.io/aruna-network/dev:sha-${{ needs.build.outputs.short_sha }} \
            cargo test --workspace

  # ── Job 3: Publish summary ──────────────────────────────────────────────────
  summarize:
    name: Publish Summary
    runs-on: ubuntu-24.04
    needs: [build, validate]
    if: always()
    permissions:
      contents: read

    steps:
      - name: Write job summary
        run: |
          echo "## 🐳 ODE Image Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ needs.build.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.validate.result }}" = "success" ]; then
            echo "### ✅ Image Validated & Published" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "| Tag | Pull Command |" >> $GITHUB_STEP_SUMMARY
            echo "|-----|-------------|" >> $GITHUB_STEP_SUMMARY
            echo "| latest | \`docker pull ghcr.io/aruna-network/dev:latest\` |" >> $GITHUB_STEP_SUMMARY
            echo "| commit | \`docker pull ghcr.io/aruna-network/dev:sha-${{ needs.build.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Validation Failed — Image NOT safe to use" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "The image was pushed to GHCR but **failed validation**." >> $GITHUB_STEP_SUMMARY
            echo "Do NOT use \`ghcr.io/aruna-network/dev:latest\` until validation passes." >> $GITHUB_STEP_SUMMARY
          fi
