name: Build & Validate ODE Image

# Triggered when the ODE image definition or toolchain spec changes.
# All development environments and CI derive from this image.
on:
  push:
    branches:
      - main
    paths:
      - 'docker/ode/Dockerfile'
      - 'rust-toolchain.toml'
      - '.github/workflows/docker-ode.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: aruna-network/ode

jobs:
  # ── Job 1: Build the ODE image ──────────────────────────────────────────────
  build:
    name: Build ODE Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push ODE image (linux/amd64 + linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/ode/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            RUST_VERSION=1.96.0

  # ── Job 2: Validate the ODE image ───────────────────────────────────────────
  # Spins up the freshly built image and verifies every required tool.
  # Also runs cargo check + cargo test to confirm the workspace compiles.
  validate:
    name: Validate ODE Image
    runs-on: ubuntu-24.04
    needs: build
    permissions:
      contents: read
      packages: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull freshly built ODE image
        run: docker pull ghcr.io/aruna-network/ode:sha-${{ needs.build.outputs.short_sha }}

      # ── Tool version checks ─────────────────────────────────────────────────
      - name: Check rustc --version
        run: |
          docker run --rm ghcr.io/aruna-network/ode:sha-${{ needs.build.outputs.short_sha }} \
            rustc --version

      - name: Check cargo --version
        run: |
          docker run --rm ghcr.io/aruna-network/ode:sha-${{ needs.build.outputs.short_sha }} \
            cargo --version

      - name: Check gcc --version
        run: |
          docker run --rm ghcr.io/aruna-network/ode:sha-${{ needs.build.outputs.short_sha }} \
            gcc --version

      - name: Check clang --version
        run: |
          docker run --rm ghcr.io/aruna-network/ode:sha-${{ needs.build.outputs.short_sha }} \
            clang --version

      - name: Check cmake --version
        run: |
          docker run --rm ghcr.io/aruna-network/ode:sha-${{ needs.build.outputs.short_sha }} \
            cmake --version

      # ── Workspace checks ────────────────────────────────────────────────────
      - name: cargo check --workspace
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e CXXFLAGS="-include cstdint" \
            -e LIBCLANG_PATH=/usr/lib/llvm-18/lib \
            -e CC=gcc -e CXX=g++ \
            ghcr.io/aruna-network/ode:sha-${{ needs.build.outputs.short_sha }} \
            cargo check --workspace

      - name: cargo test --workspace
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            -e CXXFLAGS="-include cstdint" \
            -e LIBCLANG_PATH=/usr/lib/llvm-18/lib \
            -e CC=gcc -e CXX=g++ \
            ghcr.io/aruna-network/ode:sha-${{ needs.build.outputs.short_sha }} \
            cargo test --workspace

  # ── Job 3: Summary ──────────────────────────────────────────────────────────
  summarize:
    name: Summary
    runs-on: ubuntu-24.04
    needs: [build, validate]
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "## 🐳 ODE Image Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Field | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Commit | \`${{ needs.build.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Build | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Validation | ${{ needs.validate.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.validate.result }}" = "success" ]; then
            echo "### ✅ ODE Image Validated & Published" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
            echo "docker pull ghcr.io/aruna-network/ode:latest" >> $GITHUB_STEP_SUMMARY
            echo "docker pull ghcr.io/aruna-network/ode:sha-${{ needs.build.outputs.short_sha }}" >> $GITHUB_STEP_SUMMARY
            echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Validation Failed — ODE image NOT safe to use" >> $GITHUB_STEP_SUMMARY
          fi
