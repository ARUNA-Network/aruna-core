name: Build Node Images (builder + runtime)

# Triggered when source code or the node Dockerfile changes.
# Requires ghcr.io/aruna-network/ode:latest to already exist.
# Run docker-ode.yml first if the ODE image has changed.
on:
  push:
    branches:
      - main
    paths:
      - 'crates/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - 'docker/node/Dockerfile'
      - 'config/**'
      - '.github/workflows/docker-node.yml'
  workflow_dispatch:
    inputs:
      ode_tag:
        description: 'ODE image tag to build from (default: latest)'
        required: false
        default: 'latest'

env:
  REGISTRY: ghcr.io
  ODE_IMAGE: ghcr.io/aruna-network/ode

jobs:
  # ── Job 1: Build node-builder image ─────────────────────────────────────────
  # Contains the ODE + compiled aruna-node binary.
  # Published as ghcr.io/aruna-network/node-builder.
  node-builder:
    name: Build node-builder Image
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.sha.outputs.short }}
      builder_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Compute short SHA
        id: sha
        run: echo "short=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for node-builder
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aruna-network/node-builder
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push node-builder image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/node/Dockerfile
          target: builder
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            ODE_IMAGE=${{ env.ODE_IMAGE }}:${{ github.event.inputs.ode_tag || 'latest' }}

  # ── Job 2: Build node-runtime image ─────────────────────────────────────────
  # Minimal production image: binary + config + TLS certs only.
  # Published as ghcr.io/aruna-network/node-runtime.
  node-runtime:
    name: Build node-runtime Image
    runs-on: ubuntu-24.04
    needs: node-builder
    permissions:
      contents: read
      packages: write
    outputs:
      runtime_digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata for node-runtime
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/aruna-network/node-runtime
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=sha-,format=short
            type=ref,event=branch

      - name: Build and push node-runtime image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/node/Dockerfile
          target: runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64,linux/arm64
          build-args: |
            ODE_IMAGE=${{ env.ODE_IMAGE }}:${{ github.event.inputs.ode_tag || 'latest' }}

  # ── Job 3: Smoke-test the runtime image ─────────────────────────────────────
  smoke-test:
    name: Smoke Test Runtime Image
    runs-on: ubuntu-24.04
    needs: node-runtime
    permissions:
      contents: read
      packages: read

    steps:
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Pull runtime image
        run: docker pull ghcr.io/aruna-network/node-runtime:sha-${{ needs.node-builder.outputs.short_sha }}

      - name: Verify binary exists and is executable
        run: |
          docker run --rm \
            ghcr.io/aruna-network/node-runtime:sha-${{ needs.node-builder.outputs.short_sha }} \
            /app/aruna-node --version

      - name: Verify no build toolchain present in runtime image
        run: |
          docker run --rm \
            ghcr.io/aruna-network/node-runtime:sha-${{ needs.node-builder.outputs.short_sha }} \
            sh -c '! command -v rustc && ! command -v cargo && ! command -v gcc && echo "✓ Runtime image is clean — no build toolchain"'

  # ── Job 4: Summary ──────────────────────────────────────────────────────────
  summarize:
    name: Summary
    runs-on: ubuntu-24.04
    needs: [node-builder, node-runtime, smoke-test]
    if: always()
    steps:
      - name: Write job summary
        run: |
          echo "## 🐳 Node Image Build Report" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Image | Status | Pull Command |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|-------------|" >> $GITHUB_STEP_SUMMARY
          echo "| node-builder | ${{ needs.node-builder.result }} | \`docker pull ghcr.io/aruna-network/node-builder:sha-${{ needs.node-builder.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| node-runtime | ${{ needs.node-runtime.result }} | \`docker pull ghcr.io/aruna-network/node-runtime:sha-${{ needs.node-builder.outputs.short_sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| smoke-test | ${{ needs.smoke-test.result }} | — |" >> $GITHUB_STEP_SUMMARY
