services:
  # ── ARUNA Node ───────────────────────────────────────────────────────────
  # Production runtime image — minimal, no Rust compiler.
  # P2P port 9000 → open to internet (peer discovery).
  # RPC port 8080 → localhost only (cloudflared.service connects via localhost:8080).
  node:
    image: ghcr.io/aruna-network/node:latest
    container_name: aruna-node
    restart: unless-stopped
    stop_grace_period: 30s
    ports:
      - "9000:9000"             # P2P — must be open to internet
      - "127.0.0.1:8080:8080"   # RPC — localhost only
    volumes:
      - /opt/aruna-data:/app/data_sumatera
    environment:
      - RUST_LOG=info
    command: ["--p2p-port", "9000", "--rpc-port", "8080"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ── PostgreSQL (Explorer Index DB) ───────────────────────────────────────
  # ADR-0017: Shared read/write database for indexer and explorer API.
  # Isolated to localhost — never directly exposed to the internet.
  postgres:
    image: postgres:16-alpine
    container_name: aruna-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: aruna
      POSTGRES_PASSWORD: aruna
      POSTGRES_DB: aruna_explorer
    volumes:
      - /opt/aruna-pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U aruna -d aruna_explorer"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Indexer ───────────────────────────────────────────────────────────────
  # ADR-0017: Polls Node RPC, writes to PostgreSQL. Never reads RocksDB.
  indexer:
    image: ghcr.io/aruna-network/node:latest
    container_name: aruna-indexer
    restart: unless-stopped
    depends_on:
      node:
        condition: service_healthy
      postgres:
        condition: service_healthy
    environment:
      - RUST_LOG=info
    volumes:
      - /opt/aruna-config:/app/config:ro
    command: ["aruna-indexer", "--config", "/app/config/indexer.toml"]

  # ── Explorer REST API ─────────────────────────────────────────────────────
  # ADR-0017: Reads from PostgreSQL, serves /api/v1/* to the public via Cloudflare.
  explorer:
    image: ghcr.io/aruna-network/node:latest
    container_name: aruna-explorer
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - RUST_LOG=info
    ports:
      - "127.0.0.1:3000:3000"   # localhost only — expose via cloudflared or nginx
    volumes:
      - /opt/aruna-config:/app/config:ro
    command: ["aruna-explorer", "--config", "/app/config/explorer.toml"]
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  # Note: production uses host paths (/opt/aruna-*) for data persistence.
  # These are not named volumes — they are bind mounts defined above.
